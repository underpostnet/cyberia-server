name: CD | Cyberia mmo server | remote ssh
on:
  push:
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run (deploy)'
        required: true
        type: choice
        options:
          - deploy
permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  deploy:
    if: >-
      github.repository == 'underpostnet/cyberia-server'
      && (
        startsWith(github.event.head_commit.message, 'cd(ssh-cyberia-server)')
        || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'deploy')
      )
    name: Remote SSH deployment
    runs-on: ubuntu-latest
    steps:
      - name: Run remote deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIV_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 60m
          script: |
            set -e
            echo "Starting remote deploy"
            cd /home/dd/engine
            sudo -n -- /bin/bash -lc "node bin run pull"
            sudo -n -- /bin/bash -lc "node bin run secret"
            sudo -n -- /bin/bash -lc "node bin/build dd-cyberia conf"
            sudo -n -- /bin/bash -lc "node bin run instance --tls --node-name $HOSTNAME 'dd-cyberia,mmo-server' --log-type underpost"
