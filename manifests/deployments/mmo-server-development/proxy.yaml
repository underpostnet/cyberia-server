
---
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: server.cyberiaonline.com
  namespace: default
spec:
  virtualhost:
    fqdn: server.cyberiaonline.com
  routes:
    - conditions:
        - prefix: /
      
      enableWebsockets: true
      services:
        - name: dd-cyberia-mmo-server-development-blue-service
          port: 8083
          weight: 100
    