// Protocol Buffers schema for Cyberia Online gRPC data pipeline.
//
// This service runs on the Engine-Cyberia (Node.js) side.
// The Cyberia-Server (Go) acts as the gRPC **client**, calling
// these RPCs to fetch game data for world reconstruction.
//
// Design rules:
//   1. Read-only — no create / update / delete.
//   2. Batch-friendly — large collections streamed or paginated.
//   3. Live-reload aware — version fields let the Go server detect
//      stale data and perform surgical in-memory replacement.

syntax = "proto3";

package cyberia;

option go_package = "cyberia-server/proto";

// ═══════════════════════════════════════════════════════════════════
// Service definition
// ═══════════════════════════════════════════════════════════════════

service CyberiaDataService {
  // ── Instance / World Graph ──────────────────────────────────────
  // Returns the full instance graph (maps + portals) for a given
  // instance code.  Used at startup or during hot-reload.
  rpc GetFullInstance(GetFullInstanceRequest) returns (GetFullInstanceResponse);

  // ── Maps ────────────────────────────────────────────────────────
  // Returns map data (grid, entities, metadata) for one map code.
  rpc GetMapData(GetMapDataRequest) returns (GetMapDataResponse);

  // ── Object Layers ───────────────────────────────────────────────
  // Streams all ObjectLayers in the database.
  // Useful for initial cache warm-up on the Go server.
  rpc GetObjectLayerBatch(GetObjectLayerBatchRequest) returns (stream ObjectLayerMessage);

  // Returns a single ObjectLayer by item ID.
  rpc GetObjectLayer(GetObjectLayerRequest) returns (ObjectLayerMessage);

  // ── Atlas Sprite Sheets ─────────────────────────────────────────
  // Returns atlas metadata (frame positions, dimensions) for an item.
  // The actual PNG binary is served via REST (/api/file/blob/:fileId).
  rpc GetAtlasSpriteSheet(GetAtlasSpriteSheetRequest) returns (AtlasSpriteSheetMessage);

  // Streams all AtlasSpriteSheets in the database.
  // Used at startup to populate the Go server's atlas cache.
  rpc GetAtlasSpriteSheetBatch(GetAtlasSpriteSheetBatchRequest) returns (stream AtlasSpriteSheetMessage);

  // ── Reload / Health ─────────────────────────────────────────────
  // Lightweight ping to check Engine liveness before hot-reload.
  rpc Ping(PingRequest) returns (PingResponse);

  // Returns a manifest of all ObjectLayer item IDs + sha256 hashes
  // so the Go server can diff against its cache and only re-fetch
  // what changed (incremental hot-reload).
  rpc GetObjectLayerManifest(GetObjectLayerManifestRequest) returns (GetObjectLayerManifestResponse);
}

// ═══════════════════════════════════════════════════════════════════
// Common value types
// ═══════════════════════════════════════════════════════════════════

message Vec2 {
  double x = 1;
  double y = 2;
}

message Vec2I {
  int32 x = 1;
  int32 y = 2;
}

// ═══════════════════════════════════════════════════════════════════
// ObjectLayer messages
// ═══════════════════════════════════════════════════════════════════

message Stats {
  int32 effect       = 1;
  int32 resistance   = 2;
  int32 agility      = 3;
  int32 range        = 4;
  int32 intelligence = 5;
  int32 utility      = 6;
}

message ItemInfo {
  string id          = 1;
  string type        = 2;
  string description = 3;
  bool   activable   = 4;
}

message Ledger {
  string type     = 1; // ERC1155 | OFF_CHAIN
  string address  = 2;
  string token_id = 3;
}

message Render {
  string cid          = 1; // IPFS CID atlas PNG
  string metadata_cid = 2; // IPFS CID atlas metadata JSON
}

message ObjectLayerMessage {
  string  mongo_id        = 1; // MongoDB _id
  Stats   stats           = 2;
  ItemInfo item           = 3;
  Ledger  ledger          = 4;
  Render  render          = 5;
  string  sha256          = 6;
  string  cid             = 7; // IPFS CID of the OL data JSON

  // Animation metadata (populated from ObjectLayerRenderFrames ref)
  int32   frame_duration  = 8; // ms per frame
  bool    is_stateless    = 9;
}

// ── ObjectLayer requests ──────────────────────────────────────────

message GetObjectLayerBatchRequest {
  // Optional: filter by item type (e.g. "skin", "weapon").
  // Empty = return all.
  string item_type_filter = 1;
}

message GetObjectLayerRequest {
  string item_id = 1;
}

// ═══════════════════════════════════════════════════════════════════
// Atlas Sprite Sheet messages
// ═══════════════════════════════════════════════════════════════════

message FrameMetadata {
  int32 x           = 1;
  int32 y           = 2;
  int32 width       = 3;
  int32 height      = 4;
  int32 frame_index = 5;
}

message DirectionFrames {
  repeated FrameMetadata up_idle            = 1;
  repeated FrameMetadata down_idle          = 2;
  repeated FrameMetadata right_idle         = 3;
  repeated FrameMetadata left_idle          = 4;
  repeated FrameMetadata up_right_idle      = 5;
  repeated FrameMetadata down_right_idle    = 6;
  repeated FrameMetadata up_left_idle       = 7;
  repeated FrameMetadata down_left_idle     = 8;
  repeated FrameMetadata default_idle       = 9;
  repeated FrameMetadata up_walking         = 10;
  repeated FrameMetadata down_walking       = 11;
  repeated FrameMetadata right_walking      = 12;
  repeated FrameMetadata left_walking       = 13;
  repeated FrameMetadata up_right_walking   = 14;
  repeated FrameMetadata down_right_walking = 15;
  repeated FrameMetadata up_left_walking    = 16;
  repeated FrameMetadata down_left_walking  = 17;
  repeated FrameMetadata none_idle          = 18;
}

message AtlasSpriteSheetMessage {
  string          mongo_id        = 1;
  string          file_id         = 2;  // File doc _id for REST blob fetch
  string          cid             = 3;  // IPFS CID of atlas PNG
  string          item_key        = 4;
  int32           atlas_width     = 5;
  int32           atlas_height    = 6;
  int32           cell_pixel_dim  = 7;
  DirectionFrames frames          = 8;
}

message GetAtlasSpriteSheetRequest {
  string item_key = 1;
}

message GetAtlasSpriteSheetBatchRequest {
  // Empty = return all atlas sprite sheets.
}

// ═══════════════════════════════════════════════════════════════════
// Instance / world graph messages
// ═══════════════════════════════════════════════════════════════════

message PortalEdge {
  string source_map_code = 1;
  int32  source_cell_x   = 2;
  int32  source_cell_y   = 3;
  string target_map_code = 4;
  int32  target_cell_x   = 5;
  int32  target_cell_y   = 6;
  // Transport behaviour: inter-portal | inter-random | intra-random | intra-portal
  string portal_mode     = 7;
}

message InstanceMessage {
  string              mongo_id       = 1;
  string              code           = 2;
  string              name           = 3;
  string              description    = 4;
  repeated string     tags           = 5;
  repeated string     map_codes      = 6; // vertex set
  repeated PortalEdge portals        = 7; // edge set
  string              topology_mode  = 8;
  string              seed           = 9;
}

message GetFullInstanceRequest {
  string instance_code = 1;
}

message GetFullInstanceResponse {
  InstanceMessage               instance      = 1;
  repeated MapDataMessage       maps          = 2;
  repeated ObjectLayerMessage   object_layers = 3;
  InstanceConfig                config        = 4;
}

// ═══════════════════════════════════════════════════════════════════
// Instance configuration — replaces all hardcoded server defaults
// ═══════════════════════════════════════════════════════════════════

message ColorEntry {
  string key = 1;
  int32  r   = 2;
  int32  g   = 3;
  int32  b   = 4;
  int32  a   = 5;
}

message DefaultObjectLayerState {
  string item_id  = 1;
  bool   active   = 2;
  int32  quantity = 3;
}

message SkillConfigEntry {
  string          trigger_item_id = 1;   // item that triggers the skill
  reserved 2, 3;
  reserved "spawned_item_ids", "logic_event_id";
  repeated string logic_event_ids = 4;   // ordered list of skill handler keys to execute ("atlas_pistol_mk2_logic", "doppelganger", …)
}

// EconomyRules groups all Fountain & Sink economy parameters for one instance.
//
// Design: Fountain & Sink (EVE Online / WoW model)
//   Fountains   — inject new coins into the economy on every bot/player spawn.
//   Kill Transfer — zero-sum redistribution between participants on a kill event.
//   Sinks       — permanently destroy coins (alpha: all 0 / disabled by default).
//
// Off-chain fall-back: when a player has no on-chain session the server operates
// a purely in-memory wallet that resets on reconnect.  All balances map 1-to-1
// with the CKY ERC-1155 token (token ID 0) once the on-chain bridge is live.
message EconomyRules {
  // ── Fountains ──────────────────────────────────────────────────────────────
  // Coins bots carry at spawn and on every respawn (infinite mint source).
  // Guarantees PvE reward loops are never blocked by an empty bot wallet.
  int32  bot_spawn_coins               = 1;
  // Player starting wallet on connect (no persistence — resets on reconnect).
  // In guest mode this is the only coin source; persists only with on-chain auth.
  int32  player_spawn_coins            = 2;

  // ── Kill Transfer (zero-sum redistribution) ────────────────────────────────
  // Fraction [0,1] of the victim's coins transferred to the killer on a PvE kill
  // (player kills bot, or bot kills bot).  Higher than PvP rate to reward grinding.
  double coin_kill_percent_vs_bot      = 3;
  // Fraction [0,1] transferred on a PvP kill.  Intentionally lower to reduce
  // griefing frustration while still making PvP economically meaningful.
  double coin_kill_percent_vs_player   = 4;
  // Hard floor per kill: guarantees every successful kill pays at least this many
  // coins regardless of the victim's wallet size or the percent rate.
  int32  coin_kill_min_amount          = 5;

  // ── Sinks (alpha stubs — set to 0 to disable) ─────────────────────────────
  // Fraction [0,1] of the dying player's coins permanently burned on respawn.
  // Incentivises caution; 0 = disabled (recommended for alpha).
  double respawn_cost_percent          = 6;
  // Flat coins burned each time a player uses a portal (travel tax).
  // Drains coin hoarding; 0 = disabled.
  int32  portal_fee                    = 7;
  // Fraction [0,1] of item value burned on any crafting action (production tax).
  // 0 = disabled until the crafting system is implemented.
  double crafting_fee_percent          = 8;
}

// SkillRules groups the numeric tuning parameters for each skill archetype.
// These are instance-level defaults; individual SkillConfigEntry entries define
// WHICH items trigger WHICH logic, while SkillRules defines HOW that logic behaves.
message SkillRules {
  // ── Projectile skill ──
  double projectile_spawn_chance       = 1;  // base probability [0,1] per action tick
  int32  projectile_lifetime_ms        = 2;  // base projectile TTL in ms (Range stat adds extra)
  double projectile_width              = 3;  // projectile entity width in grid cells
  double projectile_height             = 4;  // projectile entity height in grid cells
  double projectile_speed_multiplier   = 5;  // multiplier applied on top of entity_base_speed

  // ── Doppelganger skill ──
  double doppelganger_spawn_chance          = 6;  // base probability [0,1] per action tick
  int32  doppelganger_lifetime_ms           = 7;  // base doppelganger TTL in ms (Range adds extra)
  double doppelganger_spawn_radius          = 8;  // wander radius around spawn point in cells
  double doppelganger_initial_life_fraction = 9;  // fraction of entity_base_max_life at spawn
}

message InstanceConfig {
  // ── Rendering / camera ──
  double cell_size                     = 1;
  int32  fps                           = 2;
  int32  interpolation_ms              = 3;
  double default_obj_width             = 4;
  double default_obj_height            = 5;
  double camera_smoothing              = 6;
  double camera_zoom                   = 7;
  double default_width_screen_factor   = 8;
  double default_height_screen_factor  = 9;
  bool   dev_ui                        = 10;
  repeated ColorEntry colors           = 11;

  // ── World / AOI ──
  double aoi_radius                    = 12;
  int32  portal_hold_time_ms           = 13;
  double portal_spawn_radius           = 14;

  // ── Entity base stats ──
  double entity_base_speed             = 15;
  double entity_base_max_life          = 16;
  int32  entity_base_action_cooldown_ms     = 17;
  int32  entity_base_min_action_cooldown_ms = 18;

  // ── Bot defaults ──
  double bot_aggro_range               = 19;

  // ── Player defaults ──
  double default_player_width          = 20;
  double default_player_height         = 21;
  double player_base_life_regen_min    = 22;
  double player_base_life_regen_max    = 23;
  int32  sum_stats_limit               = 24;
  int32  max_active_layers             = 25;
  double initial_life_fraction         = 26;
  repeated DefaultObjectLayerState default_player_object_layers = 27;

  // ── Combat / death ──
  int32  respawn_duration_ms           = 28;
  double collision_life_loss           = 30;

  // ── Economy ──
  // Wire numbers reserved to prevent field ID reuse (moved to economy_rules = 62).
  reserved 32, 53, 54, 55, 56, 57, 58, 59, 60, 61;

  // ── Regen ──
  double life_regen_chance             = 33;
  double max_chance                    = 34;

  // ── Skill tuning (grouped) ──
  // Fields 35–43 and 46 are reserved — previously held flat projectile/doppelganger
  // params and default_player_color. Replaced by skill_rules (47) and the PLAYER
  // key in the colors repeated field.
  reserved 35, 36, 37, 38, 39, 40, 41, 42, 43, 46;
  reserved "bullet_spawn_chance", "bullet_lifetime_ms", "bullet_width",
           "bullet_height", "bullet_speed_multiplier",
           "doppelganger_spawn_chance", "doppelganger_lifetime_ms",
           "doppelganger_spawn_radius", "doppelganger_initial_life_fraction",
           "default_player_color";

  // Fields 29, 31, 44, 48–51 retired — superseded by entity_defaults (52).
  reserved 29, 31, 44, 48, 49, 50, 51;
  reserved "ghost_item_id", "coin_item_id", "default_floor_item_id",
           "bot_default_item_id", "user_default_item_id",
           "weapon_default_item_id", "bullet_default_item_id";

  // ── Skill map (trigger → logic + items) ──
  repeated SkillConfigEntry skill_config = 45;

  // ── Skill tuning parameters ──
  SkillRules skill_rules                 = 47;

  // ── Economy parameters (Fountain & Sink model) ──
  EconomyRules economy_rules             = 62;

  // ── Entity type rendering defaults ─────────────────────────────────────────
  // Structured per-entity-type configuration replacing the former flat item ID
  // fields.  Each entry defines the live OL, dead OL, and palette colour key
  // for one entity type ('player', 'bot', 'skill', 'coin', 'floor', …).
  // The Go server derives ghost/coin/floor item IDs from this repeated field.
  repeated EntityTypeDefault entity_defaults = 52;
}

// ── Entity type defaults (per-entity visual + color configuration) ──────────
// Replaces the former flat string fields: ghost_item_id (29), coin_item_id (31),
// default_floor_item_id (44), bot_default_item_id (48), user_default_item_id (49).
message EntityTypeDefault {
  string entity_type    = 1; // matches entity_type_str / bot Behavior in game engine
  repeated string live_item_ids = 2; // OL item IDs for the alive/active state
  repeated string dead_item_ids = 3; // OL item IDs for the dead/ghost/respawning state
  string color_key      = 4; // palette key for solid-color fallback (no OL items)
}

// ═══════════════════════════════════════════════════════════════════
// Map messages
// ═══════════════════════════════════════════════════════════════════

message EntityMessage {
  string          entity_type = 1;
  int32           init_cell_x = 2;
  int32           init_cell_y = 3;
  int32           dim_x       = 4;
  int32           dim_y       = 5;
  string          color       = 6;
  repeated string object_layer_item_ids = 7;

  // Bot-specific fields
  double          spawn_radius = 8;  // wandering radius (0 = use server default)
  double          aggro_range  = 9;  // aggro detection range (0 = use server default)
  double          max_life     = 10; // base max life (0 = use server default)
  double          life_regen   = 11; // life regen rate (0 = use server default)

  // Portal-specific field
  string          portal_subtype = 12; // inter-portal | inter-random | intra-random | intra-portal
}

message MapDataMessage {
  string                  mongo_id    = 1;
  string                  code        = 2;
  string                  name        = 3;
  int32                   grid_x      = 4;
  int32                   grid_y      = 5;
  int32                   cell_width  = 6;
  int32                   cell_height = 7;
  repeated EntityMessage  entities    = 8;
}

message GetMapDataRequest {
  string map_code = 1;
  // Code of the Go instance making the request — used by the Engine
  // to update the cyberia-global-map-code-registry live tracking table.
  string instance_code = 2;
}

message GetMapDataResponse {
  MapDataMessage map = 1;
}

// ═══════════════════════════════════════════════════════════════════
// Reload / health messages
// ═══════════════════════════════════════════════════════════════════

message PingRequest {}
message PingResponse {
  int64 server_time_ms = 1;
}

message ObjectLayerManifestEntry {
  string item_id = 1;
  string sha256  = 2;
}

message GetObjectLayerManifestRequest {}

message GetObjectLayerManifestResponse {
  repeated ObjectLayerManifestEntry entries = 1;
}
